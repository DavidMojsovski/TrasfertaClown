<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🤡</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            background:#f8f5ef;
            font-family:'Cormorant Garamond', serif;
            display:flex;
            justify-content:center;
            padding:50px 20px;

        }

        .card{

            background:white;
            max-width:750px;
            width:100%;
            border-radius:22px;
            overflow:hidden;
            box-shadow:0 15px 45px rgba(0,0,0,.18);

        }

        img{

            display:block;
            width:100%;

        }

        h1{

            padding:55px 40px;
            text-align:center;
            font-size:52px;
            font-weight:700;
            line-height:1.2;
            color:#222;

        }

        h2{

            width:100%;
            text-align:center;
            font-size:42px;
            font-weight:700;
            color:#222;
            padding:45px 20px 55px;
            font-style:italic;

        }

        @media(max-width:700px){

            h1{

                font-size:38px;
                padding:40px 25px;

            }

            h2{

                font-size:32px;
                padding:35px 20px 45px;

            }

        }

    </style>

</head>

<body>

<div class="card">

    <img src="clown.jpg" alt="Clown">

    <h1>
        Per un clown come te,<br>
        c'è bisogno di un gran palcoscenico.
    </h1>

    <img src="https://images.unsplash.com/photo-1552832230-c0197dd311b5?auto=format&fit=crop&w=1400&q=80" alt="Colosseo">

    <h2>
        Ci penso io fenomeno
    </h2>

</div>

</body>

</html>
